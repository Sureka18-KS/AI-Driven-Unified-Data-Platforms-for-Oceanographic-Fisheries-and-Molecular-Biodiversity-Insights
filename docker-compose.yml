services:
  backend:
    build:
      context: .
      dockerfile: backend.Dockerfile
    container_name: oceaniq_backend
    ports:
      - "8000:8000"
    restart: unless-stopped
    # Environment variables can be loaded from a .env file if it exists
    env_file:
      - .env

  frontend:
    build:
      context: ./frontend
      dockerfile: frontend.Dockerfile
    container_name: oceaniq_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

networks:
  default:
    name: oceaniq_network
